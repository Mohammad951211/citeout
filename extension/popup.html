<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiteOut</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="logo-text">CiteOut</span>
      </div>
    </div>

    <!-- URL display -->
    <div class="url-section">
      <label class="field-label">Page URL</label>
      <div class="url-display" id="url-display">Loading...</div>
    </div>

    <div class="api-status" id="api-status">Checking API connection...</div>

    <!-- Style selector -->
    <div class="field-group">
      <label class="field-label" for="style-select">Citation Style</label>
      <select class="select" id="style-select">
        <option value="APA">APA 7th Edition</option>
        <option value="MLA">MLA 9th Edition</option>
        <option value="CHICAGO">Chicago 17th Edition</option>
        <option value="IEEE">IEEE</option>
        <option value="HARVARD">Harvard</option>
        <option value="VANCOUVER">Vancouver</option>
      </select>
    </div>

    <!-- Generate button -->
    <button class="btn btn-primary" id="generate-btn">
      Generate Citation
    </button>

    <!-- Output -->
    <div class="output-section hidden" id="output-section">
      <div class="output-header">
        <div class="output-meta">
          <span class="output-style" id="output-style"></span>
          <span class="output-rank hidden" id="output-rank"></span>
          <span class="output-mode" id="output-mode"></span>
        </div>
        <button class="btn-copy" id="copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
      <div class="output-text" id="output-text"></div>
    </div>

    <!-- Error -->
    <div class="error-section hidden" id="error-section">
      <p id="error-text"></p>
    </div>

    <!-- Guest counter -->
    <div class="guest-counter" id="guest-counter"></div>

    <!-- Footer link -->
    <div class="footer">
      <a href="https://citeout.site" target="_blank">Open CiteOut</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
